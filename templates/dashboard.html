<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Moniteur d'API</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 1.5rem; }
        .card { border: 2px solid #eef2f3; padding: 1.5rem; border-radius: 8px; }
        .status { font-weight: bold; padding: 5px 10px; border-radius: 20px; font-size: 0.9rem; }
        .ok { background-color: #d4edda; color: #155724; }
        .latence { font-size: 2rem; color: #3498db; margin: 1rem 0; font-weight: bold; }
        .label { color: #7f8c8d; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Surveillance API</h1>
        <div class="card">
            <div class="label">Source</div>
            <div><strong>{{ data.nom }}</strong></div>
            
            <div class="latence">{{ data.latence }}</div>
            <div class="label">Temps de réponse</div>
            
            <p>Statut : <span class="status ok">{{ data.status }}</span></p>
            <hr>
            <div class="label">Dernière vérification</div>
            <div style="font-size: 0.9rem;">{{ data.derniere_verif }}</div>
        </div>
    </div>
</body>
</html>
